<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>VogelSimulator</title>

  <!-- PWA: fullscreen on iOS home screen -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="VogelSim" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.json" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
  <a href="https://ki-mathias.de/" style="
    position:fixed; top:12px; left:12px; z-index:200;
    color:rgba(255,255,255,0.6); font:13px sans-serif; text-decoration:none;
    background:rgba(0,0,0,0.3); padding:6px 12px; border-radius:8px;
    transition:background 0.2s;
  " onmouseover="this.style.background='rgba(0,0,0,0.5)'"
     onmouseout="this.style.background='rgba(0,0,0,0.3)'"
  >&larr; ki-mathias.de</a>
  <button id="lang-toggle" style="
    position:fixed; top:12px; right:12px; z-index:200;
    color:rgba(255,255,255,0.7); font:bold 12px sans-serif;
    background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.2);
    padding:5px 10px; border-radius:8px; cursor:pointer;
    transition:background 0.2s;
  " onmouseover="this.style.background='rgba(0,0,0,0.5)'"
     onmouseout="this.style.background='rgba(0,0,0,0.3)'"
  >EN</button>
  <script type="module">
    import { lang, toggleLang, onLangChange } from '/src/i18n.js';
    const btn = document.getElementById('lang-toggle');
    btn.textContent = lang() === 'de' ? 'EN' : 'DE';
    btn.addEventListener('click', () => {
      toggleLang();
      btn.textContent = lang() === 'de' ? 'EN' : 'DE';
    });
    onLangChange(() => { btn.textContent = lang() === 'de' ? 'EN' : 'DE'; });
  </script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
